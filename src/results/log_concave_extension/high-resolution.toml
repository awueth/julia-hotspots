# Final (proof-bearing) resolution. Build scripts default to this file, so the
# shared potential and eigenfunction artifacts are built from these parameters.
name = "high-resolution"

[potential]
x_domain = [-1.5707963267948966, 1.5707963267948966]
y_domain = [-1.0, 1.0]
wing_x_max = 6.283185307179586
quadrant_factor = 4.0
temperature = 0.2
core_strength = 10.0
wing_strength = 1.0e6
core_fit_grid = [128, 128]
wing_fit_grid = [128, 128]
normalization_core_cells = [128, 128]
normalization_wing_cells = [128, 128]

[candidate]
d = +inf
diam_x = 12.566370614359172
diam_y = 2.0
lambda = 3.80155720841065
solver = "dense"
n_modes = [128, 32]
sampler = [512, 32]

[fem]
partition = [256, 128]
nev = 4

[evaluate]
residual_grid = [1024, 128]
hot_spot_grid = [1024, 128, 128]
linf_atol = 0.05

[rayleigh]
core_cells = [512, 256]

[lower_bounds]
fem_positive_tolerance = 1.0e-8
cr_interpolation_constant = 0.1893
lambda2_upper = 10.0
first_constant_cells_core = [32, 32]
first_constant_cells_wing = [8, 8]
second_constant_ny_wing = 256

[lower_bounds.lambda1]
t1 = 0.9
t2 = 0.1
delta = 0.01

[lower_bounds.lambda2]
t1 = 0.599
t2 = 0.001
delta = 0.001

[pointwise]
alpha = 0.424
ultracontractivity_t2 = 5.0e-6
times = [
    1.175, 1.1875, 1.2, 1.2125, 1.225, 1.2375, 1.25, 1.2625,
    1.275, 1.2875, 1.3, 1.3125, 1.325, 1.3375, 1.35, 1.3625,
    1.375, 1.3875, 1.4, 1.4125, 1.425, 1.4375, 1.45, 1.4625,
    1.475, 1.4875, 1.5, 1.5125, 1.525, 1.5375, 1.55, 1.5625,
    1.575, 1.5875, 1.6, 1.62, 1.64, 1.66, 1.68, 1.7,
    1.72, 1.74, 1.76, 1.78, 1.8, 1.82, 1.84, 1.86,
    1.88, 1.9, 1.92, 1.94, 1.96, 1.98, 2.0, 2.02,
    2.04, 2.06, 2.08, 2.1, 2.12, 2.14, 2.16, 2.18,
    2.2, 2.25, 2.3, 2.35, 2.4, 2.45, 2.5, 2.55,
    2.6, 2.65, 2.7, 2.75, 2.8, 2.85, 2.9, 2.95,
    3.0, 3.05, 3.1, 3.15, 3.2, 3.25, 3.3, 3.35,
    3.4, 3.45, 3.5, 3.75, 4.0, 4.25, 4.5, 5.0,
    5.5, 6.0, 7.0, 8.0, 10.0, 12.0, 15.0, 20.0,
    30.0, 50.0, 100.0, +inf,
