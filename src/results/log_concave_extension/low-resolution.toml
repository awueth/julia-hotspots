# Coarse resolution for phase-3 tuning (fast quadratures). Phase 3 loads the
# shared high-resolution artifacts; the [potential]/[candidate] tables here only
# matter if you rebuild artifacts with `--config low-resolution.toml` for local
# testing.
name = "low-resolution"

[potential]
x_domain = [-1.5707963267948966, 1.5707963267948966]
y_domain = [-1.0, 1.0]
wing_x_max = 6.283185307179586
quadrant_factor = 4.0
temperature = 0.2
core_strength = 10.0
wing_strength = 1.0e6
core_fit_grid = [32, 32]
wing_fit_grid = [32, 32]
normalization_core_cells = [16, 16]
normalization_wing_cells = [16, 16]

[candidate]
d = +inf
diam_x = 12.566370614359172
diam_y = 2.0
lambda = 3.80155720841065
solver = "dense"
n_modes = [32, 8]
sampler = [128, 16]

[fem]
partition = [192, 96]
nev = 4

[evaluate]
residual_grid = [64, 16]
hot_spot_grid = [64, 16, 16]
linf_atol = 0.05

[rayleigh]
core_cells = [32, 16]

[lower_bounds]
fem_positive_tolerance = 1.0e-8
cr_interpolation_constant = 0.1893
lambda2_upper = 10.0
first_constant_cells_core = [8, 8]
first_constant_cells_wing = [4, 4]
second_constant_ny_wing = 64

[lower_bounds.lambda1]
t1 = 0.9
t2 = 0.1
delta = 0.01

[lower_bounds.lambda2]
t1 = 0.599
t2 = 0.001
delta = 0.001

[pointwise]
alpha = 0.35
ultracontractivity_t2 = 0.001
times = [1.3, 1.5, 2.0, 3.0, 5.0, 10.0, +inf]
ultracontractivity_cells_core = [4, 4]
ultracontractivity_cells_wing = [2, 2]
