# Finite-dimensional pipeline parameters (single flat config).
# Phase 2 (build_eigenfunction.jl) reads [fit]; phase 3 (run.jl) reads the rest.
# The potential is the shared log_concave high-resolution artifact.
name = "finite-dim"

[fit]
d = 1.0e18
diam_x = 12.566370614359172
diam_y = 2.0
lambda = 3.80155720841065
n_modes = [32, 8]
sampler = [512, 32]
solver = "dense"

[evaluate]
residual_grid = [1024, 128]
linf_grid = [1024, 128]
hot_spot_grid = [1024, 128, 128]

[ultracontractivity]
decay_split = 0.56
first_constant_cells_core = [16, 16]
first_constant_cells_wing = [8, 8]
# Fixed buffer from the core edge Lx. Its wing mass is enclosed once by adaptive
# interval quadrature and reused throughout the time-split optimization.
buffer_delta = 1.0e-3
# Grid in smoothing time t = alpha*s, where the finite-dim constant changes fast.
times = [
    0.728, 0.756, 0.784, 0.812, 0.840, 0.896, 0.952, 1.008,
    1.120, 1.400, 1.680, 1.960,
    2.080, 2.160, 2.240, 2.320, 2.400, 2.420, 2.440, 2.450,
    2.460, 2.470, 2.480, 2.560, 2.640,
    2.720, 2.800, 3.000, 3.500, 4.000, 5.000, 7.000, 10.000,
    20.000, 50.000,
]
